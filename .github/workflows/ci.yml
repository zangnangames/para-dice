name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ─── 빌드 + 테스트 ──────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (core)
        run: pnpm --filter @dice-game/core tsc --noEmit 2>/dev/null || true

      - name: Type check (client)
        run: pnpm --filter @dice-game/client tsc -b --noEmit

      - name: Type check (server)
        run: pnpm --filter @dice-game/server tsc --noEmit 2>/dev/null || true

      - name: Run tests
        run: pnpm --filter @dice-game/core test --run

      - name: Build client
        run: pnpm --filter @dice-game/client build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'https://para-dice-production.up.railway.app' }}

      - name: Build server
        run: pnpm --filter @dice-game/server build

  # ─── Lighthouse CI (master 푸시 시만) ────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://paradice.zangnan.games
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true  # Lighthouse 실패해도 배포 차단 안 함
